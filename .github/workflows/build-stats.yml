name: Build tournament stats

# Regenerates public/stats.json from ESPN by aggregating every finished match.
# Runs in CI (no Cloudflare subrequest cap), commits the result, and the push
# triggers Cloudflare's auto-deploy — same cron-refreshed-static-asset pattern
# CLAUDE.md describes for history.json.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes (only commits when stats changed)
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: build-stats
  cancel-in-progress: false

jobs:
  build-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Regenerate stats.json
        run: npm run build:stats

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/stats.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/stats.json
            # No [skip ci] here on purpose: this push is exactly what should
            # trigger Cloudflare's auto-build to deploy the refreshed asset.
            git commit -m "chore: refresh tournament stats"
            git push
          else
            echo "stats.json unchanged — nothing to commit."
          fi
